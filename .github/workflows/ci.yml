name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race -count=1 -timeout 90s ./...
      - name: Build
        shell: bash
        run: |
          go build ./cmd/client
          go build ./cmd/server

  termux-client-build:
    name: Termux client build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
          - goarch: arm
            goarm: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Cross-build Android client
        env:
          CGO_ENABLED: '0'
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build ./cmd/client

  lint:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...
